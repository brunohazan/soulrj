<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Soul RJ — Favicon Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 512px; height: 512px; overflow: hidden; background: #1a1815; }
  canvas { display: block; width: 512px; height: 512px; }
</style>
</head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const S = 512;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

async function draw() {
  await document.fonts.ready;

  // Background
  ctx.fillStyle = '#1a1815';
  ctx.fillRect(0, 0, S, S);

  const cx = S / 2;

  // ── "soul" — light 300 ──
  const soulSize = 82;
  ctx.save();
  ctx.font = `300 ${soulSize}px "Plus Jakarta Sans"`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = `${-0.02 * soulSize}px`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = 'rgba(244, 239, 228, 0.82)';
  ctx.fillText('soul', cx, 204);
  ctx.restore();

  // ── "rj" — semibold 600 ──
  const rjSize = 205;
  ctx.save();
  ctx.font = `600 ${rjSize}px "Plus Jakarta Sans"`;
  if ('letterSpacing' in ctx) ctx.letterSpacing = `${-0.05 * rjSize}px`;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#f4efe4';

  const rjMetrics = ctx.measureText('rj');
  const rjW = rjMetrics.width;

  const dotR    = 17;
  const dotGap  = 11;
  const totalW  = rjW + dotGap + dotR * 2;
  const startX  = cx - totalW / 2;
  const rjY     = 385;

  ctx.fillText('rj', startX, rjY);
  ctx.restore();

  // ── ponto terracota ──
  const dotCx = startX + rjW + dotGap + dotR;
  const dotCy = rjY - 27;
  ctx.fillStyle = '#b15a3c';
  ctx.beginPath();
  ctx.arc(dotCx, dotCy, dotR, 0, Math.PI * 2);
  ctx.fill();
}

draw();
</script>
</body>
</html>
