<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Soul RJ — Post 10 · Dark · Não é promessa. É método.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080808; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; gap: 20px; }
    .frame { width: 540px; height: 675px; overflow: hidden; border-radius: 10px; flex-shrink: 0; box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 80px rgba(0,0,0,0.7), 0 8px 24px rgba(0,0,0,0.4); }
    .post { width: 1080px; height: 1350px; transform: scale(0.5); transform-origin: top left; background: #0A0A0B; position: relative; overflow: hidden; font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .corner { position: absolute; width: 48px; height: 48px; z-index: 3; pointer-events: none; }
    .corner-tl { top: 20px; left: 20px; border-top: 2px solid rgba(255,255,255,0.18); border-left: 2px solid rgba(255,255,255,0.18); }
    .corner-tr { top: 20px; right: 20px; border-top: 2px solid rgba(255,255,255,0.18); border-right: 2px solid rgba(255,255,255,0.18); }
    .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(255,255,255,0.18); border-left: 2px solid rgba(255,255,255,0.18); }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(255,255,255,0.18); border-right: 2px solid rgba(255,255,255,0.18); }
    .dot-grid { position: absolute; inset: 0; z-index: 1; pointer-events: none; background-image: radial-gradient(rgba(255,255,255,.045) 1px, transparent 1px); background-size: 32px 32px; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000 30%, transparent 100%); }
    .glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 900px; height: 900px; z-index: 2; background: radial-gradient(circle, rgba(214,255,61,0.055) 0%, transparent 60%); pointer-events: none; }
    .stripe { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #b15a3c 0%, #d4764e 60%, transparent 100%); z-index: 20; }
    .grain { position: absolute; inset: 0; z-index: 15; pointer-events: none; mix-blend-mode: overlay; opacity: 0.065; }
    .content { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; padding: 60px 80px 64px; }
    .top-bar { display: flex; align-items: flex-start; justify-content: space-between; }
    .wm { display: inline-flex; align-items: baseline; background: rgba(10,10,11,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.09); padding: 14px 24px; border-radius: 999px; }
    .wm-soul { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 300; font-size: 26px; color: rgba(244,239,228,0.82); letter-spacing: -0.04em; line-height: 1; }
    .wm-rj   { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 26px; color: #f4efe4; letter-spacing: -0.04em; line-height: 1; }
    .wm-period { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 28px; color: #b15a3c; line-height: 1; margin-left: 1px; }
    .tag { font-family: 'Geist Mono', monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(244,239,228,0.7); background: rgba(177,90,60,0.15); border: 1px solid rgba(177,90,60,0.35); padding: 12px 20px; border-radius: 999px; }
    .mid { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .contrast { display: flex; flex-direction: column; gap: 4px; margin-bottom: 64px; }
    .line-muted { font-size: 96px; font-weight: 400; letter-spacing: -0.048em; line-height: 1.1; color: rgba(244,239,228,0.18); }
    .line-bold { font-size: 96px; font-weight: 600; letter-spacing: -0.048em; line-height: 1.1; color: #f4efe4; }
    .line-bold em { font-style: normal; color: #D6FF3D; }
    .rule { height: 1px; background: rgba(255,255,255,0.09); margin-bottom: 40px; }
    .body-copy { display: flex; flex-direction: column; }
    .bc-line { font-size: 52px; font-weight: 300; letter-spacing: -0.03em; line-height: 1.28; color: rgba(244,239,228,0.55); }
    .bc-line.accent { font-weight: 500; color: #D6FF3D; }
    .bottom-bar { display: flex; align-items: center; justify-content: space-between; }
    .op-tag { font-family: 'Geist Mono', monospace; font-size: 13px; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(255,255,255,0.28); display: flex; align-items: center; gap: 14px; }
    .op-pulse { width: 7px; height: 7px; border-radius: 50%; background: #b15a3c; box-shadow: 0 0 0 4px rgba(177,90,60,0.15); flex-shrink: 0; animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 4px rgba(177,90,60,0.15)}50%{box-shadow:0 0 0 10px rgba(177,90,60,0)} }
    .airbnb-rating { font-family: 'Geist Mono', monospace; font-size: 13px; letter-spacing: 0.06em; color: rgba(255,255,255,0.28); display: flex; align-items: center; gap: 6px; }
    .airbnb-rating .star { color: #b15a3c; font-size: 15px; }
    .airbnb-rating .sep { width: 1px; height: 12px; background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <div class="frame">
    <div class="post">
      <div class="stripe"></div>
      <div class="dot-grid"></div>
      <div class="glow"></div>
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <svg class="grain" xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" aria-hidden="true">
        <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/></filter>
        <rect width="100%" height="100%" filter="url(#noise)"/>
      </svg>
      <div class="content">
        <div class="top-bar">
          <div class="wm"><span class="wm-soul">soul</span><span class="wm-rj">rj</span><span class="wm-period">.</span></div>
          <span class="tag">método</span>
        </div>
        <div class="mid">
          <div class="contrast">
            <div class="line-muted">Não é<br>promessa.</div>
            <div class="line-bold">É <em>método.</em></div>
          </div>
          <div class="rule"></div>
          <div class="body-copy">
            <span class="bc-line">Precificação dinâmica.</span>
            <span class="bc-line">Atendimento 24/7.</span>
            <span class="bc-line accent">Operação auditada.</span>
          </div>
        </div>
        <div class="bottom-bar">
          <div class="op-tag"><span class="op-pulse"></span>// gestão premium · rio de janeiro</div>
          <div class="airbnb-rating"><span class="star">★</span><span class="sep"></span><span>4,99 airbnb</span></div>
        </div>
      </div>
    </div>
  </div>
  <p style="color:#333;font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:0.06em">soul rj. &nbsp;·&nbsp; post-10 &nbsp;·&nbsp; sistema · alltype dark &nbsp;·&nbsp; 1080 × 1350 px</p>
</body>
</html>
